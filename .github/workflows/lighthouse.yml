name: Lighthouse

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.15.1

      - name: Run Lighthouse CI
        run: lhci autorun
