<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="utf-8">
	<title>Página no encontrada | David Rojo</title>
	<meta name="description" content="La página solicitada no existe. Vuelve a davidrojo.eu.">
	<meta name="robots" content="noindex">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
	<link rel="canonical" href="https://davidrojo.eu/404.html">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700&amp;display=swap" rel="stylesheet">
	<link rel="stylesheet" href="css/basic.css">
	<link rel="stylesheet" href="css/layout.css">
	<link rel="stylesheet" href="css/customized.css">
	<link rel="icon" href="https://davidrojo.eu/images/favicons/favicon_dr.ico" sizes="any">
	<link rel="shortcut icon" href="https://davidrojo.eu/images/favicons/favicon_dr.ico">
	<style>
		.not-found-page {
			position: relative;
			overflow: hidden;
			min-height: 100vh;
			background: #004494;
			color: #fff;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 30px;
			text-align: center;
		}

		.not-found-page::before,
		.not-found-page::after {
			content: "";
			position: absolute;
			inset: 0;
		}

		.not-found-page::before {
			background: url(images/bg/galaxy.webp) center center / cover no-repeat;
			opacity: 0.5;
		}

		.not-found-page::after {
			background: rgba(0, 0, 0, 0.2);
		}

		.not-found-card {
			position: relative;
			z-index: 1;
			max-width: 720px;
			padding: 48px 36px;
			background: rgba(0, 0, 0, 0.68);
			box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
		}

		.not-found-code {
			margin: 0 0 12px;
			font-size: 88px;
			line-height: 1;
			font-weight: 100;
		}

		.not-found-card h1 {
			margin: 0 0 18px;
			color: #fff;
			font-size: 34px;
			font-weight: 700;
		}

		.not-found-card p {
			margin: 0 auto 28px;
			max-width: 560px;
			font-size: 17px;
			line-height: 1.7;
			font-weight: 300;
		}

		.not-found-actions {
			display: flex;
			gap: 14px;
			justify-content: center;
			flex-wrap: wrap;
		}

		.not-found-actions a {
			display: inline-block;
			padding: 12px 20px;
			border: 1px solid rgba(255, 255, 255, 0.75);
			color: #fff;
			text-decoration: none;
			font-weight: 400;
			transition: background 0.2s ease, color 0.2s ease;
		}

		.not-found-actions a:hover,
		.not-found-actions a:focus {
			background: #fff;
			color: #111;
		}

		@media (max-width: 560px) {
			.not-found-card {
				padding: 36px 24px;
			}

			.not-found-code {
				font-size: 64px;
			}

			.not-found-card h1 {
				font-size: 28px;
			}
		}
	</style>
</head>
<body>
	<main class="not-found-page">
		<section class="not-found-card" aria-labelledby="not-found-title">
			<p class="not-found-code">404</p>
			<h1 id="not-found-title">Página no encontrada</h1>
			<p>La página que buscas no existe o ha cambiado de dirección. Puedes volver a la página principal.</p>
			<p lang="en">The page you are looking for does not exist or has moved. You can go back to the homepage.</p>
			<div class="not-found-actions">
				<a href="/">Volver al inicio</a>
			</div>
		</section>
	</main>
</body>
</html>
